name: Docker Image CI

on:
  workflow_dispatch:
    inputs:
      jena-version:
        description: "Jena version to containerize"
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PAT }}

      - name: Build the Docker image
        run: |
          docker build . \
            --build-arg JENA_VERSION=${{ inputs.jena-version }} \
            --tag ${{ secrets.DOCKER_USERNAME }}/jena-fuseki-docker:${{ inputs.jena-version }}

      - name: Push the Docker image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/jena-fuseki-docker:${{ inputs.jena-version }}
